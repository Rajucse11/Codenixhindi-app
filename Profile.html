<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile - Codenix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #050b14; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .profile-card { background: #0f172a; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #1e293b; }
        #userImg { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #2563eb; margin-bottom: 15px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; }
        button { background: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div class="profile-card">
    <img id="userImg" src="https://ui-avatars.com/api/?name=User" alt="Profile">
    <h2 id="profName">Name</h2>
    <p id="profEmail" style="color:#94a3b8;">email@example.com</p>
    
    <div style="margin-top:20px; text-align:left;">
        <label>Update Photo URL:</label>
        <input type="text" id="photoUrlInput" placeholder="Paste image link here...">
        <button onclick="updateProfile()">Save Photo</button>
        <button onclick="window.location.href='codenixhindi.html'" style="background:transparent; margin-top:10px;">Back to Home</button>
    </div>
</div>

<script>
    // Page load hote hi data dikhao
    window.onload = () => {
        document.getElementById('profName').innerText = localStorage.getItem("codenix_user_name");
        document.getElementById('profEmail').innerText = localStorage.getItem("codenix_user_email") || "User";
        
        const savedPhoto = localStorage.getItem("codenix_user_photo");
        if(savedPhoto) {
            document.getElementById('userImg').src = savedPhoto;
        }
    };

    function updateProfile() {
        const newUrl = document.getElementById('photoUrlInput').value;
        if(newUrl) {
            localStorage.setItem("codenix_user_photo", newUrl);
            document.getElementById('userImg').src = newUrl;
            alert("Photo Updated!");
        }
    }
</script>
</body>
</html>
